name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Run JS-based actions (checkout, setup-node, pnpm/action-setup) on Node 24
# instead of the deprecated Node 20. GitHub will make this the default in
# June 2026; opt in early to silence the deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r typecheck

      - run: pnpm -r build

      - run: pnpm -r test

      - name: Workspace example runs green
        run: pnpm --filter csv-merge run run

      - name: Verify result.json
        run: |
          test -f examples/csv-merge/output/result.json
          rows=$(node -e "console.log(JSON.parse(require('fs').readFileSync('examples/csv-merge/output/result.json')).length)")
          test "$rows" = "8" || (echo "expected 8 rows, got $rows" && exit 1)

      - name: Bundled example runs green from built package
        run: node packages/tinydag/dist/cli.js example run csv-merge

      - name: Custom-step example runs green (TS handler via tsx)
        run: pnpm --filter custom-step-example run run

      - name: Verify report.md
        run: |
          test -f examples/custom-step/output/report.md
          grep -q '^# Event Report' examples/custom-step/output/report.md
          grep -q '^| view | 12 |' examples/custom-step/output/report.md
          grep -q 'Warnings (count < 5)' examples/custom-step/output/report.md

      - name: Pack and inspect tarball
        run: |
          pnpm --filter tinydag pack --pack-destination /tmp
          tar -tzf /tmp/tinydag-*.tgz | grep -q 'examples/csv-merge/dag.yml' \
            || (echo "tarball missing csv-merge example" && exit 1)
          tar -tzf /tmp/tinydag-*.tgz | grep -q 'examples/custom-step/dag.yml' \
            || (echo "tarball missing custom-step example" && exit 1)
          tar -tzf /tmp/tinydag-*.tgz | grep -q 'examples/postgres-load/dag.yml' \
            || (echo "tarball missing postgres-load example" && exit 1)

  # Postgres integration test. Service containers only work on Linux runners,
  # so this job is Ubuntu-only and runs in parallel with build-and-test.
  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tinydag
          POSTGRES_PASSWORD: tinydag
          POSTGRES_DB: tinydag
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PG_URL: postgresql://tinydag:tinydag@localhost:5432/tinydag
      PGPASSWORD: tinydag
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter postgres-load-example run typecheck

      - name: Run postgres-load example
        run: pnpm --filter postgres-load-example run run

      - name: Verify rows in Postgres
        run: |
          rows=$(psql -h localhost -U tinydag -d tinydag -t -A -c "SELECT count(*) FROM users")
          test "$rows" = "8" || (echo "expected 8 rows, got $rows" && exit 1)
          # Confirm transform step lowercased the emails before the upsert.
          psql -h localhost -U tinydag -d tinydag -t -A -c "SELECT email FROM users WHERE id = 1" \
            | grep -q '^ada@example.com$' \
            || (echo "expected lowercased email for id=1" && exit 1)

      - name: Re-run to verify ON CONFLICT DO UPDATE path
        run: |
          pnpm --filter postgres-load-example run run
          rows=$(psql -h localhost -U tinydag -d tinydag -t -A -c "SELECT count(*) FROM users")
          test "$rows" = "8" || (echo "second run produced duplicates: $rows" && exit 1)

  release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build

      - run: pnpm publish --filter tinydag --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
